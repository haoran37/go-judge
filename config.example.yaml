# HnieOJ 判题节点示例配置。
# 部署时建议复制为实际运行配置后再修改，不要直接提交真实密码、授权码或私钥。

node:
  # 判题节点名称。建议全局唯一，便于后端心跳、日志和运维定位。
  name: judge-node-01
  # 节点类型：formal 表示正式长期节点；temp 表示临时节点。
  type: formal
  # 本节点同时处理的最大判题任务数。通常不应超过机器可承载的并发沙箱数量。
  maxConcurrency: 4
  # 节点声明支持的判题模式。默认只开放 default；确认后端和题目协议闭环后再开启 spj/interactive。
  supportedJudgeModes:
    - default

remoteConfig:
  # 是否从 Nacos 拉取非敏感运行参数。敏感信息仍建议放在本地配置或环境变量中。
  enabled: false
  nacos:
    serverAddr: "http://127.0.0.1:8848"
    namespace: "dev"
    group: "HNIEOJ_JUDGE_GROUP"
    dataId: "hnieoj-judge-node.yaml"

hnieoj:
  # HnieOJ 后端服务地址，节点会访问认证、测试数据、事件上报和心跳接口。
  baseUrl: "https://oj.example.com"
  # 节点访问后端接口的 HTTP 超时时间。
  requestTimeout: "30s"

  formalToken:
    # formal 节点私钥路径。容器内路径通常由部署脚本挂载到该位置。
    privateKeyPath: "/etc/hnieoj/judge-security/judge_formal_private.pem"
    # formal token 解密算法。当前后端/节点约定为 RSA OAEP SHA-256。
    cipherAlgorithm: "RSA/ECB/OAEPWithSHA-256AndMGF1Padding"
    # formal 节点轮询 Nacos token 密文的间隔。
    refreshInterval: "30s"
    nacos:
      serverAddr: "http://127.0.0.1:8848"
      namespace: "dev"
      group: "HNIEOJ_SECRET_GROUP"
      dataId: "hnieoj-judge-formal-token.yaml"

  tempToken:
    # temp 节点授权码。部署脚本会先用它兑换 JWT，成功后再启动容器。
    authCode: ""
    # 部署脚本预兑换得到的 JWT。容器启动时优先使用该值作为首次凭证。
    jwt: ""
    # JWT 类型，通常为 Bearer。
    tokenType: ""
    # 后端返回的临时节点 ID。
    nodeId: ""
    # 后端返回的临时 token ID。
    tokenId: ""
    # JWT 过期时间。节点会在过期前使用 authCode 刷新。
    expireTime: ""

rabbitmq:
  # RabbitMQ 连接配置。
  host: "127.0.0.1"
  port: 5672
  username: "guest"
  password: "replace_me"
  virtualHost: "/"
  # 判题任务交换机、队列、路由键。
  exchange: "hnieoj.judge.exchange"
  queue: "hnieoj.judge.task"
  routingKey: "judge.submission.created"
  # 死信队列配置。超过最大重试次数后进入 DLQ。
  deadLetterExchange: "hnieoj.judge.dlx"
  deadLetterQueue: "hnieoj.judge.task.dlq"
  deadLetterRoutingKey: "judge.submission.created.dlq"
  # RabbitMQ 预取数量。通常与 node.maxConcurrency 保持一致。
  prefetch: 4
  # 可重试错误的最大重试次数和重试退避。
  maxRetries: 3
  retryBackoff: "10s"

testdata:
  # 测试数据缓存目录。部署脚本会挂载宿主机持久化目录到这里。
  cacheRoot: "/data/oj/judge-cache"
  # 测试数据缓存最大字节数。0 表示不按容量清理。
  maxCacheBytes: 21474836480
  # 测试数据多久未使用后可清理。0 表示不按时间清理。
  maxUnusedDuration: "72h"
  # 缓存清理任务执行间隔。
  cleanupInterval: "1h"
  # 心跳中的缓存和磁盘统计采样间隔，避免每次心跳都扫描磁盘。
  statsInterval: "5m"

gojudge:
  # go-judge sandbox 地址。容器部署时通常为 http://go-judge-sandbox:5050。
  endpoint: "http://127.0.0.1:5050"
  # 如果 sandbox 开启了 -auth-token，这里填写对应 token；默认留空。
  authToken: ""

reporter:
  # 事件上报模式：http 表示上报后端；log/mock 适合本地调试。
  mode: "http"
  endpoint: "/judge/submissions/{submissionId}/events"

heartbeat:
  # 是否开启节点心跳。生产环境建议开启。
  enabled: true
  endpoint: "/judge/nodes/heartbeat"
  # 生产环境建议保持 30 秒左右，不要调到 1 秒级别。
  interval: "30s"
